<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="To The Moon!"/>
  <meta name="theme-color" content="#0a0a1a"/>
  <title>To The Moon! 🚀</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      touch-action: none;
    }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const BASE_W = 360, BASE_H = 640;
let scale = 1;
function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / BASE_W, wh / BASE_H);
  canvas.width = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const W = BASE_W, H = BASE_H;
const GRAVITY = 0.45;
const FLAP = -9;
const CANDLE_W = 52;
const GAP = 160;
const SPEED = 2.8;
const CANDLE_INTERVAL = 95;
const GROUND_H = 60;

let state = 'idle';
let rocket, candles, score, bestScore, frame, particles, flashTimer, stars, coins;
bestScore = 0;

// Generate static stars
stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * (H - GROUND_H),
    r: Math.random() * 1.8 + 0.3,
    a: Math.random() * 0.7 + 0.3,
    twinkle: Math.random() * Math.PI * 2
  });
}

function initGame() {
  rocket = { x: 75, y: H / 2, vy: 0, rot: 0, w: 44, h: 28, alive: true, frameTimer: 0 };
  candles = [];
  coins = [];
  score = 0;
  frame = 0;
  particles = [];
  flashTimer = 0;
}

function flap() {
  if (state === 'idle') { state = 'playing'; rocket.vy = FLAP; }
  else if (state === 'playing') {
    rocket.vy = FLAP;
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: rocket.x, y: rocket.y + rocket.h / 2,
        vx: -Math.random() * 3 - 1,
        vy: (Math.random() - 0.5) * 2,
        life: 18, maxLife: 18,
        r: Math.random() * 4 + 2,
        color: ['#ff9500','#ffcc00','#ff4500'][Math.floor(Math.random()*3)]
      });
    }
  }
  else if (state === 'dead') { initGame(); state = 'playing'; rocket.vy = FLAP; }
}

document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); } });
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });

function spawnCandle() {
  const minY = 70, maxY = H - GROUND_H - 120 - GAP;
  const topH = Math.random() * (maxY - minY) + minY;
  const isGreen = Math.random() > 0.45; // slightly more green = safe passages
  // Body height (wick extends beyond)
  const topBodyH = topH * 0.75;
  const botBodyH = (H - GROUND_H - topH - GAP) * 0.75;
  candles.push({
    x: W + 10, topH, isGreen,
    topBodyH, botBodyH, scored: false
  });
  // Coin in middle of gap
  coins.push({
    x: W + 10 + CANDLE_W / 2,
    y: topH + GAP / 2,
    collected: false,
    anim: Math.random() * Math.PI * 2
  });
}

// Draw rocket with BTC symbol
function drawRocket() {
  const r = rocket;
  ctx.save();
  ctx.translate(r.x + r.w / 2, r.y + r.h / 2);
  ctx.rotate(r.rot * Math.PI / 180);

  // Exhaust flame
  const flameLen = 12 + Math.sin(r.frameTimer * 0.4) * 5;
  const grad = ctx.createLinearGradient(-r.w/2 - flameLen, 0, -r.w/2, 0);
  grad.addColorStop(0, 'rgba(255,80,0,0)');
  grad.addColorStop(0.5, 'rgba(255,160,0,0.9)');
  grad.addColorStop(1, 'rgba(255,220,0,1)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-r.w/2, -5);
  ctx.lineTo(-r.w/2 - flameLen, 0);
  ctx.lineTo(-r.w/2, 5);
  ctx.closePath();
  ctx.fill();

  // Rocket body
  const bodyGrad = ctx.createLinearGradient(0, -r.h/2, 0, r.h/2);
  bodyGrad.addColorStop(0, '#e8e8f0');
  bodyGrad.addColorStop(1, '#a0a0c0');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, r.w/2, r.h/2, 0, 0, Math.PI*2);
  ctx.fill();

  // Nose cone (gold)
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.moveTo(r.w/2, 0);
  ctx.lineTo(r.w/2 - 14, -r.h/2 + 2);
  ctx.lineTo(r.w/2 - 14, r.h/2 - 2);
  ctx.closePath();
  ctx.fill();

  // Fin bottom
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.moveTo(-r.w/2 + 4, r.h/2 - 2);
  ctx.lineTo(-r.w/2 - 6, r.h/2 + 10);
  ctx.lineTo(-r.w/2 + 14, r.h/2 - 2);
  ctx.closePath();
  ctx.fill();

  // Fin top
  ctx.beginPath();
  ctx.moveTo(-r.w/2 + 4, -r.h/2 + 2);
  ctx.lineTo(-r.w/2 - 6, -r.h/2 - 10);
  ctx.lineTo(-r.w/2 + 14, -r.h/2 + 2);
  ctx.closePath();
  ctx.fill();

  // Window circle (orange BTC coin)
  ctx.fillStyle = '#f7931a';
  ctx.beginPath();
  ctx.arc(4, 0, 11, 0, Math.PI * 2);
  ctx.fill();

  // BTC ₿ symbol
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('₿', 4, 1);

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(5, -6, r.w/2 - 10, r.h/2 - 8, -0.3, 0, Math.PI);
  ctx.fill();

  ctx.restore();
}

// Draw candlestick obstacle
function drawCandle(c) {
  const wickW = 6;
  const bodyX = c.x;
  const wickX = c.x + CANDLE_W/2 - wickW/2;
  const rimExtra = 5;

  const green = c.isGreen;
  const bodyColor = green ? '#00c853' : '#d50000';
  const darkColor = green ? '#007722' : '#8b0000';
  const rimColor = green ? '#00e676' : '#ff5252';
  const wickColor = green ? '#00a040' : '#aa0000';

  // TOP candle — wick
  ctx.fillStyle = wickColor;
  ctx.fillRect(wickX, 0, wickW, c.topH - c.topBodyH);

  // TOP candle — body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(bodyX, c.topH - c.topBodyH, CANDLE_W, c.topBodyH);
  ctx.fillStyle = darkColor;
  ctx.fillRect(bodyX + CANDLE_W - 12, c.topH - c.topBodyH, 12, c.topBodyH);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(bodyX + 4, c.topH - c.topBodyH, 8, c.topBodyH);

  // TOP rim
  ctx.fillStyle = rimColor;
  ctx.fillRect(bodyX - rimExtra, c.topH - 18, CANDLE_W + rimExtra*2, 18);

  // BOTTOM candle — rim
  const botY = c.topH + GAP;
  ctx.fillStyle = rimColor;
  ctx.fillRect(bodyX - rimExtra, botY, CANDLE_W + rimExtra*2, 18);

  // BOTTOM candle — body
  const botBodyStart = botY + 18;
  ctx.fillStyle = bodyColor;
  ctx.fillRect(bodyX, botBodyStart, CANDLE_W, c.botBodyH);
  ctx.fillStyle = darkColor;
  ctx.fillRect(bodyX + CANDLE_W - 12, botBodyStart, 12, c.botBodyH);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(bodyX + 4, botBodyStart, 8, c.botBodyH);

  // BOTTOM wick
  const wickBot = botBodyStart + c.botBodyH;
  ctx.fillStyle = wickColor;
  ctx.fillRect(wickX, wickBot, wickW, H - GROUND_H - wickBot);
}

// Draw coin (BTC style)
function drawCoin(coin) {
  if (coin.collected) return;
  const bob = Math.sin(coin.anim) * 4;
  ctx.save();
  ctx.translate(coin.x, coin.y + bob);
  // Glow
  ctx.shadowColor = '#f7931a';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#f7931a';
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('₿', 0, 1);
  ctx.restore();
}

// Draw ground (space platform)
function drawGround() {
  const grad = ctx.createLinearGradient(0, H - GROUND_H, 0, H);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  // Glowing line at top
  ctx.strokeStyle = '#4040ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#4040ff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, H - GROUND_H);
  ctx.lineTo(W, H - GROUND_H);
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Grid lines
  ctx.strokeStyle = 'rgba(64,64,255,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 30) {
    ctx.beginPath();
    ctx.moveTo(i, H - GROUND_H);
    ctx.lineTo(i, H);
    ctx.stroke();
  }
}

function drawBackground() {
  // Deep space gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#000008');
  grad.addColorStop(0.5, '#0a0020');
  grad.addColorStop(1, '#1a0030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    s.twinkle += 0.02;
    const alpha = s.a * (0.6 + Math.sin(s.twinkle) * 0.4);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Moon in background
  ctx.fillStyle = 'rgba(255,255,220,0.9)';
  ctx.shadowColor = 'rgba(255,255,180,0.5)';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(W - 60, 70, 32, 0, Math.PI*2);
  ctx.fill();
  // Crater details
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(200,200,150,0.4)';
  ctx.beginPath(); ctx.arc(W - 52, 60, 6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W - 70, 75, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W - 55, 82, 3, 0, Math.PI*2); ctx.fill();

  // Background candlestick chart (semi-transparent)
  drawBgChart();

  // Scrolling price ticker at bottom of sky
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(0,200,100,0.4)';
  const tickerText = '  BTC +12.4%   ETH +8.2%   SOL +22.1%   DOGE +5.3%   BNB +3.8%   ';
  const tw = ctx.measureText(tickerText).width;
  const tickX = ((frame * 0.8) % tw);
  ctx.fillText(tickerText + tickerText, -tickX, H - GROUND_H - 8);
}

// Static bg chart data — pre-generated realistic OHLC candles
const BG_CANDLES = (function() {
  const arr = [];
  let price = 220;
  for (let i = 0; i < 28; i++) {
    const open = price;
    const change = (Math.random() - 0.46) * 22;
    const close = Math.max(60, Math.min(420, open + change));
    const high = Math.max(open, close) + Math.random() * 14;
    const low = Math.min(open, close) - Math.random() * 14;
    arr.push({ open, close, high, low });
    price = close;
  }
  return arr;
})();

function drawBgChart() {
  const cw = 11;   // candle body width
  const gap = 4;   // gap between candles
  const step = cw + gap;
  const chartH = 200; // chart area height
  const chartY = 90;  // top of chart area
  const totalCandles = BG_CANDLES.length;

  // Find price range for scaling
  let minP = Infinity, maxP = -Infinity;
  for (const c of BG_CANDLES) { minP = Math.min(minP, c.low); maxP = Math.max(maxP, c.high); }
  const range = maxP - minP || 1;
  const toY = p => chartY + chartH - ((p - minP) / range) * chartH;

  // Slow horizontal scroll
  const scrollOffset = (frame * 0.3) % step;

  ctx.save();
  ctx.globalAlpha = 0.18;

  for (let i = 0; i < totalCandles + 2; i++) {
    const idx = i % totalCandles;
    const c = BG_CANDLES[idx];
    const x = i * step - scrollOffset;
    if (x + cw < 0 || x > W) continue;

    const isGreen = c.close >= c.open;
    const bodyTop = toY(Math.max(c.open, c.close));
    const bodyBot = toY(Math.min(c.open, c.close));
    const bodyH = Math.max(2, bodyBot - bodyTop);
    const wickX = x + cw / 2;

    // Wick
    ctx.strokeStyle = isGreen ? '#00e676' : '#ff5252';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(wickX, toY(c.high));
    ctx.lineTo(wickX, toY(c.low));
    ctx.stroke();

    // Body
    ctx.fillStyle = isGreen ? '#00c853' : '#d50000';
    ctx.fillRect(x, bodyTop, cw, bodyH);
  }

  ctx.restore();
}

function checkCollision() {
  const bx = rocket.x + 6, by = rocket.y + 5;
  const bw = rocket.w - 14, bh = rocket.h - 10;
  if (rocket.y + rocket.h > H - GROUND_H || rocket.y < 0) return true;
  for (const c of candles) {
    const rimExtra = 5;
    if (bx < c.x + CANDLE_W + rimExtra && bx + bw > c.x - rimExtra) {
      if (by < c.topH) return true;
      if (by + bh > c.topH + GAP) return true;
    }
  }
  return false;
}

function checkCoinCollect() {
  for (const coin of coins) {
    if (coin.collected) continue;
    const dx = rocket.x + rocket.w/2 - coin.x;
    const dy = rocket.y + rocket.h/2 - coin.y;
    if (Math.sqrt(dx*dx + dy*dy) < 20) {
      coin.collected = true;
      score++;
      if (score > bestScore) bestScore = score;
      // Coin collect particles
      for (let i = 0; i < 8; i++) {
        const angle = (i/8)*Math.PI*2;
        particles.push({
          x: coin.x, y: coin.y,
          vx: Math.cos(angle)*3, vy: Math.sin(angle)*3,
          life: 20, maxLife: 20, r: 3,
          color: '#f7931a'
        });
      }
    }
  }
}

function spawnScoreParticles() {
  for (let i = 0; i < 14; i++) {
    const angle = (i/14)*Math.PI*2;
    particles.push({
      x: W/2, y: 80,
      vx: Math.cos(angle)*(Math.random()*4+2),
      vy: Math.sin(angle)*(Math.random()*4+2),
      life: 30, maxLife: 30,
      r: Math.random()*5+3,
      color: ['#f7931a','#ffcc00','#00c853','#fff'][Math.floor(Math.random()*4)]
    });
  }
  flashTimer = 8;
}

function drawScore() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px Arial';
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillText(score, W/2+3, 93);
  ctx.strokeStyle = '#f7931a';
  ctx.lineWidth = 4;
  ctx.strokeText(score, W/2, 90);
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W/2, 90);
}

function drawIdleScreen() {
  // Dark panel
  ctx.fillStyle = 'rgba(0,0,10,0.6)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 155, H/2 - 150, 310, 260, 20);
  ctx.fill();
  ctx.strokeStyle = 'rgba(247,147,26,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold 46px Arial';
  ctx.strokeStyle = '#7a3000';
  ctx.lineWidth = 5;
  ctx.strokeText('TO THE MOON!', W/2, H/2 - 80);
  ctx.fillStyle = '#f7931a';
  ctx.fillText('TO THE MOON!', W/2, H/2 - 80);

  // Rocket emoji line
  ctx.font = '32px Arial';
  ctx.fillText('🚀  ₿  🌙', W/2, H/2 - 35);

  // Subtitle
  ctx.font = 'bold 15px Arial';
  ctx.fillStyle = 'rgba(255,200,100,0.8)';
  ctx.fillText('Dodge red candles. Ride the bull run.', W/2, H/2 + 5);

  // Tap prompt
  const pulse = 0.6 + Math.sin(frame * 0.08) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 26px Arial';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.strokeText('TAP TO LAUNCH 🚀', W/2, H/2 + 55);
  ctx.fillText('TAP TO LAUNCH 🚀', W/2, H/2 + 55);
  ctx.globalAlpha = 1;

  if (bestScore > 0) {
    ctx.font = 'bold 20px Arial';
    ctx.fillStyle = '#f7931a';
    ctx.strokeStyle = '#7a3000';
    ctx.lineWidth = 2;
    ctx.strokeText(`Best: ${bestScore}`, W/2, H/2 + 90);
    ctx.fillText(`Best: ${bestScore}`, W/2, H/2 + 90);
  }
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(0,0,10,0.7)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 140, H/2 - 130, 280, 240, 20);
  ctx.fill();
  ctx.strokeStyle = 'rgba(213,0,0,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.textAlign = 'center';

  ctx.font = 'bold 40px Arial';
  ctx.strokeStyle = '#7a0000';
  ctx.lineWidth = 4;
  ctx.strokeText('RUGGED! 💀', W/2, H/2 - 70);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('RUGGED! 💀', W/2, H/2 - 70);

  ctx.font = 'bold 22px Arial';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeText(`Score: ${score}`, W/2, H/2 - 22);
  ctx.fillText(`Score: ${score}`, W/2, H/2 - 22);

  ctx.font = 'bold 20px Arial';
  ctx.fillStyle = '#f7931a';
  ctx.strokeStyle = '#7a3000';
  ctx.lineWidth = 2;
  ctx.strokeText(`Best: ${bestScore}`, W/2, H/2 + 18);
  ctx.fillText(`Best: ${bestScore}`, W/2, H/2 + 18);

  // Market message
  const msgs = ['Market crashed 📉', 'Candle got you 🕯️', 'HODL next time 💎', 'Bear market wins 🐻'];
  ctx.font = 'italic 15px Arial';
  ctx.fillStyle = 'rgba(255,150,100,0.8)';
  ctx.fillText(msgs[score % msgs.length], W/2, H/2 + 50);

  const pulse = 0.6 + Math.sin(frame * 0.1) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 22px Arial';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.strokeText('TAP TO RETRY', W/2, H/2 + 90);
  ctx.fillText('TAP TO RETRY', W/2, H/2 + 90);
  ctx.globalAlpha = 1;
}

function update() {
  frame++;

  if (state === 'playing') {
    rocket.vy += GRAVITY;
    rocket.y += rocket.vy;
    rocket.frameTimer++;
    rocket.rot = Math.max(-30, Math.min(85, rocket.vy * 4));

    if (frame % CANDLE_INTERVAL === 0) spawnCandle();

    for (const c of candles) {
      c.x -= SPEED;
      if (!c.scored && c.x + CANDLE_W < rocket.x) {
        c.scored = true;
        score++;
        if (score > bestScore) bestScore = score;
        spawnScoreParticles();
      }
    }
    candles = candles.filter(c => c.x + CANDLE_W + 20 > 0);

    for (const coin of coins) {
      coin.x -= SPEED;
      coin.anim += 0.06;
    }
    coins = coins.filter(c => c.x > -20);

    checkCoinCollect();

    if (checkCollision()) {
      state = 'dead';
      rocket.alive = false;
      for (let i = 0; i < 22; i++) {
        particles.push({
          x: rocket.x + rocket.w/2, y: rocket.y + rocket.h/2,
          vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10-3,
          life: 45, maxLife: 45,
          r: Math.random()*7+3,
          color: ['#f7931a','#ff4500','#ffcc00','#fff'][Math.floor(Math.random()*4)]
        });
      }
    }
  }

  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15; p.life--;
  }
  particles = particles.filter(p => p.life > 0);
  if (flashTimer > 0) flashTimer--;
}

function draw() {
  drawBackground();

  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,200,50,${flashTimer/8*0.2})`;
    ctx.fillRect(0, 0, W, H);
  }

  for (const c of candles) drawCandle(c);
  for (const coin of coins) drawCoin(coin);

  drawGround();

  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  drawRocket();

  if (state === 'playing') drawScore();
  if (state === 'idle') drawIdleScreen();
  if (state === 'dead') drawDeadScreen();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

initGame();
loop();
</script>
</body>
</html>
