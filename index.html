<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="To The Moon!"/>
  <meta name="theme-color" content="#0a0a1a"/>
  <title>To The Moon! 🚀</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background:#000; display:flex; justify-content:center; align-items:center; height:100dvh; overflow:hidden; font-family:'Arial Rounded MT Bold',Arial,sans-serif; touch-action:none; }
    canvas { display:block; image-rendering:pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const BASE_W = 360, BASE_H = 640;
let scale = 1;
function resize() {
  scale = Math.min(window.innerWidth/BASE_W, window.innerHeight/BASE_H);
  canvas.width = BASE_W*scale; canvas.height = BASE_H*scale;
  ctx.setTransform(scale,0,0,scale,0,0);
}
resize(); window.addEventListener('resize', resize);
const W=BASE_W, H=BASE_H, GROUND_H=60;

// ── CONSTANTS ────────────────────────────────────────────
const GRAVITY      = 0.45;
const FLAP_V       = -9;
const CANDLE_W     = 52;
const CANDLE_GAP   = 155;
const SPEED        = 2.8;
const SPAWN_EVERY  = 88; // fixed even spacing (frames)

// Phase definitions
// order cycles: normal(20) → bull(10) → normal(20) → bear(10) → repeat
const PHASE_ORDER  = ['normal','bull','normal','bear'];
const PHASE_LIMIT  = { normal:20, bull:10, bear:10 };
const PHASE_CFG = {
  normal: { label:'📊 NORMAL MARKET', color:'#8888ff', bg0:'#000008', bg1:'#0a0020', bg2:'#1a0030', redChance:0.45, gapPos:'random' },
  bull:   { label:'🐂 BULL RUN!',     color:'#00e676', bg0:'#001408', bg1:'#002818', bg2:'#003820', redChance:0,    gapPos:'high'   },
  bear:   { label:'🐻 BEAR MARKET!',  color:'#ff4444', bg0:'#180000', bg1:'#2a0000', bg2:'#1a0010', redChance:1,    gapPos:'low'    },
};

// ── AUDIO ────────────────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }
document.addEventListener('pointerdown', resumeAC, {once:true});
document.addEventListener('keydown', resumeAC, {once:true});
function tone(freq,type,dur,vol=0.25,delay=0){
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.setValueAtTime(freq,AC.currentTime+delay);
  g.gain.setValueAtTime(vol,AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay); o.stop(AC.currentTime+delay+dur+0.01);
}
const sfx = {
  flap:    ()=>{ tone(300,'sine',0.07,0.15); tone(460,'sine',0.05,0.08,0.04); },
  coin:    ()=>{ [880,1100,1320].forEach((f,i)=>tone(f,'sine',0.09,0.18,i*0.07)); },
  score:   ()=>{ tone(440,'square',0.05,0.1); tone(550,'square',0.05,0.1,0.07); },
  death:   ()=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination); o.type='sawtooth';
    o.frequency.setValueAtTime(400,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(55,AC.currentTime+0.7);
    g.gain.setValueAtTime(0.35,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.7);
    o.start(); o.stop(AC.currentTime+0.75);
  },
  milestone:()=>{ [523,659,784,1047].forEach((f,i)=>tone(f,'square',0.13,0.18,i*0.11)); },
  bull:    ()=>{ [330,440,550,660].forEach((f,i)=>tone(f,'sine',0.1,0.14,i*0.08)); },
  bear:    ()=>{ [440,330,220,165].forEach((f,i)=>tone(f,'sawtooth',0.1,0.11,i*0.08)); },
  normal:  ()=>{ [440,440].forEach((f,i)=>tone(f,'sine',0.08,0.1,i*0.12)); },
};

// Background music
let musicTO;
let musicNodes=[];
let currentMusicPhase='normal';

// Normal: slow ambient lo-fi
// Bull:   upbeat rising arpeggios (major, bright)
// Bear:   slow descending minor (tense, dark)
const MUSIC_SEQS = {
  normal: { notes:[130,146,164,174,196,220,246,261], type:'sine',  step:0.5,  vol:0.035 },
  bull:   { notes:[261,330,392,523,392,330,523,659], type:'triangle', step:0.25, vol:0.04 },
  bear:   { notes:[220,196,174,164,146,130,110,98],  type:'sawtooth', step:0.45, vol:0.028 },
};

function startMusic(phase){
  stopMusic();
  currentMusicPhase = phase || 'normal';
  const cfg = MUSIC_SEQS[currentMusicPhase];
  let t = AC.currentTime + 0.1;
  const loop = () => {
    if(AC.state==='closed') return;
    cfg.notes.forEach((n,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type=cfg.type; o.frequency.value=n;
      g.gain.setValueAtTime(0,t+i*cfg.step);
      g.gain.linearRampToValueAtTime(cfg.vol,t+i*cfg.step+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*cfg.step+cfg.step*0.9);
      o.start(t+i*cfg.step); o.stop(t+i*cfg.step+cfg.step);
      musicNodes.push(o);
    });
    t+=cfg.notes.length*cfg.step;
    musicTO=setTimeout(loop,(t-AC.currentTime-3)*1000);
  };
  loop();
}
function stopMusic(){ clearTimeout(musicTO); musicNodes.forEach(n=>{try{n.stop();}catch(e){}}); musicNodes=[]; }

// ── HALL OF FAME ─────────────────────────────────────────
let hof=[];
try{ hof=JSON.parse(localStorage.getItem('ttm_hof')||'[]'); }catch(e){}
function saveHof(){ try{ localStorage.setItem('ttm_hof',JSON.stringify(hof)); }catch(e){} }
function addHof(s){ hof.push(s); hof.sort((a,b)=>b-a); hof=hof.slice(0,5); saveHof(); }

// ── STARS / BG CHART ─────────────────────────────────────
const stars=[];
for(let i=0;i<80;i++) stars.push({x:Math.random()*W,y:Math.random()*(H-GROUND_H),r:Math.random()*1.8+0.3,a:Math.random()*0.7+0.3,tw:Math.random()*Math.PI*2});

// Network nodes
const NODES=[];
for(let i=0;i<14;i++) NODES.push({x:Math.random()*W,y:Math.random()*(H-GROUND_H-60)+30,vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.18,r:Math.random()*2.5+1.5});

// Floating crypto logos
const LOGOS=[];
const LOGO_SYMS=['₿','Ξ','◎','Ð','⬡'];
for(let i=0;i<10;i++) LOGOS.push({x:Math.random()*W,y:Math.random()*(H-GROUND_H),vy:-(Math.random()*0.3+0.15),sym:LOGO_SYMS[i%LOGO_SYMS.length],size:Math.random()*10+10,a:Math.random()*0.18+0.06,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.005});

const BGC=(()=>{
  const a=[]; let p=220;
  for(let i=0;i<28;i++){
    const o=p, ch=(Math.random()-0.46)*22, c=Math.max(60,Math.min(420,o+ch));
    a.push({open:o,close:c,high:Math.max(o,c)+Math.random()*14,low:Math.min(o,c)-Math.random()*14});
    p=c;
  }
  return a;
})();

// ── STATE ────────────────────────────────────────────────
let state='idle';
let rocket, candles, coins, score, bestScore=0, frame;
let particles, flashTimer;
let phaseIdx, candlesInPhase;
let phaseAnnounce, milestoneAnnounce;

function initGame(){
  rocket={x:75,y:H/2,vy:0,rot:0,w:44,h:28,alive:true,ft:0};
  candles=[]; coins=[]; score=0; frame=0;
  particles=[]; flashTimer=0;
  phaseIdx=0; candlesInPhase=0;
  phaseAnnounce=null; milestoneAnnounce=null;
}

function curPhase(){ return PHASE_ORDER[phaseIdx%PHASE_ORDER.length]; }
function curCfg(){ return PHASE_CFG[curPhase()]; }

// ── INPUT ────────────────────────────────────────────────
function flap(){
  resumeAC();
  if(state==='idle'){ state='playing'; rocket.vy=FLAP_V; sfx.flap(); startMusic('normal'); }
  else if(state==='playing'){
    rocket.vy=FLAP_V; sfx.flap();
    for(let i=0;i<6;i++) particles.push({x:rocket.x,y:rocket.y+rocket.h/2,vx:-Math.random()*3-1,vy:(Math.random()-0.5)*2,life:18,maxLife:18,r:Math.random()*4+2,col:['#ff9500','#ffcc00','#ff4500'][Math.floor(Math.random()*3)]});
  }
  else if(state==='dead'){ initGame(); state='playing'; rocket.vy=FLAP_V; sfx.flap(); startMusic('normal'); }
}
document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();} });
canvas.addEventListener('pointerdown',e=>{e.preventDefault();flap();});

// ── CANDLE SPAWN ─────────────────────────────────────────
function spawnCandle(){
  const ph=curPhase(), cfg=curCfg();
  const minY=60, maxY=H-GROUND_H-100-CANDLE_GAP;

  let topH;
  if(cfg.gapPos==='high')   topH=Math.random()*50+50;          // gap near TOP (50-100px from top)
  else if(cfg.gapPos==='low') topH=maxY-Math.random()*50;      // gap near BOTTOM
  else                       topH=Math.random()*(maxY-minY)+minY; // random

  const isGreen = Math.random() > cfg.redChance; // bull=always green, bear=always red, normal=mixed

  candles.push({x:W+10, topH, isGreen, gap:CANDLE_GAP, topBodyH:topH*0.75, botBodyH:(H-GROUND_H-topH-CANDLE_GAP)*0.75, scored:false});
  coins.push({x:W+10+CANDLE_W/2, y:topH+CANDLE_GAP/2, collected:false, anim:Math.random()*Math.PI*2});

  candlesInPhase++;

  // Check phase transition
  if(candlesInPhase>=PHASE_LIMIT[ph]){
    phaseIdx=(phaseIdx+1)%PHASE_ORDER.length;
    candlesInPhase=0;
    const newPh=curPhase(), newCfg=curCfg();
    // Only announce bull/bear, not normal
    if(newPh!=='normal'){
      phaseAnnounce={label:newCfg.label, phase:newPh, life:130, maxLife:130};
    }
    if(newPh==='bull'){ sfx.bull(); startMusic('bull'); }
    else if(newPh==='bear'){ sfx.bear(); startMusic('bear'); }
    else { sfx.normal(); startMusic('normal'); }
  }
}

// ── DRAW ROCKET ──────────────────────────────────────────
function drawRocket(){
  const r=rocket;
  ctx.save(); ctx.translate(r.x+r.w/2,r.y+r.h/2); ctx.rotate(r.rot*Math.PI/180);
  const fl=12+Math.sin(r.ft*0.4)*5;
  const fg=ctx.createLinearGradient(-r.w/2-fl,0,-r.w/2,0);
  fg.addColorStop(0,'rgba(255,80,0,0)'); fg.addColorStop(0.5,'rgba(255,160,0,0.9)'); fg.addColorStop(1,'rgba(255,220,0,1)');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(-r.w/2,-5); ctx.lineTo(-r.w/2-fl,0); ctx.lineTo(-r.w/2,5); ctx.closePath(); ctx.fill();
  const bg=ctx.createLinearGradient(0,-r.h/2,0,r.h/2);
  bg.addColorStop(0,'#e8e8f0'); bg.addColorStop(1,'#a0a0c0');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,r.w/2,r.h/2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f5c842';
  ctx.beginPath(); ctx.moveTo(r.w/2,0); ctx.lineTo(r.w/2-14,-r.h/2+2); ctx.lineTo(r.w/2-14,r.h/2-2); ctx.closePath(); ctx.fill();
  [[r.h/2-2,r.h/2+10],[-(r.h/2-2),-(r.h/2+10)]].forEach(([y1,y2])=>{
    ctx.beginPath(); ctx.moveTo(-r.w/2+4,y1); ctx.lineTo(-r.w/2-6,y2); ctx.lineTo(-r.w/2+14,y1); ctx.closePath(); ctx.fill();
  });
  ctx.fillStyle='#f7931a'; ctx.beginPath(); ctx.arc(4,0,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('₿',4,1);
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.beginPath(); ctx.ellipse(5,-6,r.w/2-10,r.h/2-8,-0.3,0,Math.PI); ctx.fill();
  ctx.restore();
}

// ── DRAW CANDLE ──────────────────────────────────────────
function drawCandle(c){
  const ww=6,bx=c.x,wx=c.x+CANDLE_W/2-ww/2,re=5;
  const g=c.isGreen;
  const bc=g?'#00c853':'#d50000', dc=g?'#007722':'#8b0000', rc=g?'#00e676':'#ff5252', wc=g?'#00a040':'#aa0000';
  ctx.fillStyle=wc; ctx.fillRect(wx,0,ww,c.topH-c.topBodyH);
  ctx.fillStyle=bc; ctx.fillRect(bx,c.topH-c.topBodyH,CANDLE_W,c.topBodyH);
  ctx.fillStyle=dc; ctx.fillRect(bx+CANDLE_W-12,c.topH-c.topBodyH,12,c.topBodyH);
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(bx+4,c.topH-c.topBodyH,8,c.topBodyH);
  ctx.fillStyle=rc; ctx.fillRect(bx-re,c.topH-18,CANDLE_W+re*2,18);
  const by=c.topH+c.gap;
  ctx.fillStyle=rc; ctx.fillRect(bx-re,by,CANDLE_W+re*2,18);
  const bs=by+18;
  ctx.fillStyle=bc; ctx.fillRect(bx,bs,CANDLE_W,c.botBodyH);
  ctx.fillStyle=dc; ctx.fillRect(bx+CANDLE_W-12,bs,12,c.botBodyH);
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(bx+4,bs,8,c.botBodyH);
  ctx.fillStyle=wc; ctx.fillRect(wx,bs+c.botBodyH,ww,H-GROUND_H-(bs+c.botBodyH));
}

// ── DRAW COIN ────────────────────────────────────────────
function drawCoin(coin){
  if(coin.collected) return;
  ctx.save(); ctx.translate(coin.x,coin.y+Math.sin(coin.anim)*4);
  ctx.shadowColor='#f7931a'; ctx.shadowBlur=12;
  ctx.fillStyle='#f7931a'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.font='bold 10px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('₿',0,1);
  ctx.restore();
}

// ── DRAW GROUND ──────────────────────────────────────────
function drawGround(){
  const gr=ctx.createLinearGradient(0,H-GROUND_H,0,H);
  gr.addColorStop(0,'#1a1a3e'); gr.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=gr; ctx.fillRect(0,H-GROUND_H,W,GROUND_H);
  ctx.strokeStyle='#4040ff'; ctx.lineWidth=2; ctx.shadowColor='#4040ff'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(0,H-GROUND_H); ctx.lineTo(W,H-GROUND_H); ctx.stroke();
  ctx.shadowBlur=0; ctx.strokeStyle='rgba(64,64,255,0.2)'; ctx.lineWidth=1;
  for(let i=0;i<W;i+=30){ ctx.beginPath(); ctx.moveTo(i,H-GROUND_H); ctx.lineTo(i,H); ctx.stroke(); }
}

// ── DRAW BACKGROUND ──────────────────────────────────────
function drawNodes(){
  ctx.save();
  // Update + draw nodes
  const MAX_DIST=90;
  for(const n of NODES){
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0||n.x>W) n.vx*=-1;
    if(n.y<30||n.y>H-GROUND_H-30) n.vy*=-1;
  }
  // Draw edges
  ctx.lineWidth=0.8;
  for(let i=0;i<NODES.length;i++){
    for(let j=i+1;j<NODES.length;j++){
      const dx=NODES[i].x-NODES[j].x, dy=NODES[i].y-NODES[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<MAX_DIST){
        ctx.globalAlpha=(1-dist/MAX_DIST)*0.18;
        ctx.strokeStyle='#8888ff';
        ctx.beginPath(); ctx.moveTo(NODES[i].x,NODES[i].y); ctx.lineTo(NODES[j].x,NODES[j].y); ctx.stroke();
      }
    }
  }
  // Draw node dots
  for(const n of NODES){
    ctx.globalAlpha=0.22;
    ctx.fillStyle='#aaaaff';
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    // Pulse ring
    const pulse=0.5+Math.sin(frame*0.04+n.x)*0.5;
    ctx.globalAlpha=0.08*pulse;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r*3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawFloatingLogos(){
  ctx.save();
  for(const l of LOGOS){
    l.y+=l.vy; l.rot+=l.rotV;
    if(l.y<-30) l.y=H-GROUND_H+10;
    ctx.globalAlpha=l.a;
    ctx.save();
    ctx.translate(l.x,l.y);
    ctx.rotate(l.rot);
    ctx.font=`bold ${l.size}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#f7931a';
    ctx.fillText(l.sym,0,0);
    ctx.restore();
  }
  ctx.restore();
}

function drawBackground(){
  const cfg=curCfg();
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,cfg.bg0); gr.addColorStop(0.5,cfg.bg1); gr.addColorStop(1,cfg.bg2);
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    s.tw+=0.02; ctx.globalAlpha=s.a*(0.6+Math.sin(s.tw)*0.4);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,220,0.9)'; ctx.shadowColor='rgba(255,255,180,0.5)'; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.arc(W-60,70,32,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='rgba(200,200,150,0.4)';
  [[W-52,60,6],[W-70,75,4],[W-55,82,3]].forEach(([x,y,r])=>{ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); });
  drawNodes();
  drawFloatingLogos();
  drawBgChart(cfg);
  const ph=curPhase();
  const tickCol=ph==='bull'?'rgba(0,220,100,':ph==='bear'?'rgba(220,50,50,':'rgba(0,200,80,';
  const tickers=[
    { txt:'  BTC +12.4%   ETH +8.2%   SOL +22.1%   DOGE +5.3%   BNB +3.8%   ', speed:0.8,  y:H-GROUND_H-8,  alpha:0.45 },
    { txt:'  ADA +6.1%   AVAX +18.3%   MATIC +9.7%   DOT +4.2%   LINK +11.5%   ', speed:0.55, y:H-GROUND_H-22, alpha:0.32 },
    { txt:'  XRP +3.9%   LTC +7.6%   ATOM +14.2%   NEAR +21.8%   FTM +33.1%   ', speed:0.7,  y:H-GROUND_H-36, alpha:0.25 },
    { txt:'  SHIB +44.2%   PEPE +61.7%   WIF +88.3%   BONK +55.1%   FLOKI +29.4%   ', speed:0.45, y:H-GROUND_H-50, alpha:0.18 },
    { txt:'  ARB +16.3%   OP +12.9%   ZK +8.1%   STRK +22.4%   IMX +17.7%   ', speed:0.6,  y:H-GROUND_H-64, alpha:0.13 },
    { txt:'  BTC.D 52.4%   TOTAL2 +9.8%   DXY -0.6%   FEAR&GREED 78   DOMINANCE ↑   ', speed:0.35, y:H-GROUND_H-78, alpha:0.09 },
  ];
  ctx.font='11px monospace';
  for(const t of tickers){
    ctx.fillStyle=tickCol+t.alpha+')';
    const tw2=ctx.measureText(t.txt).width, tx=(frame*t.speed)%tw2;
    ctx.fillText(t.txt+t.txt,-tx,t.y);
  }
}

function drawBgChart(cfg){
  const cw=11,gp=4,step=cw+gp,cH=200,cY=90,tot=BGC.length;
  let mn=Infinity,mx=-Infinity;
  BGC.forEach(c=>{ mn=Math.min(mn,c.low); mx=Math.max(mx,c.high); });
  const rng=mx-mn||1, toY=p=>cY+cH-((p-mn)/rng)*cH;
  const off=(frame*0.3)%step;
  ctx.save(); ctx.globalAlpha=0.18;
  for(let i=0;i<tot+2;i++){
    const c=BGC[i%tot], x=i*step-off;
    if(x+cw<0||x>W) continue;
    const ig=c.close>=c.open, bT=toY(Math.max(c.open,c.close)), bB=toY(Math.min(c.open,c.close));
    ctx.strokeStyle=ig?'#00e676':'#ff5252'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x+cw/2,toY(c.high)); ctx.lineTo(x+cw/2,toY(c.low)); ctx.stroke();
    ctx.fillStyle=ig?'#00c853':'#d50000'; ctx.fillRect(x,bT,cw,Math.max(2,bB-bT));
  }
  ctx.restore();
}

// ── COLLISION ────────────────────────────────────────────
function checkHit(){
  const bx=rocket.x+6,by=rocket.y+5,bw=rocket.w-14,bh=rocket.h-10;
  if(rocket.y+rocket.h>H-GROUND_H||rocket.y<0) return true;
  for(const c of candles){
    if(bx<c.x+CANDLE_W+5&&bx+bw>c.x-5){
      if(by<c.topH) return true;
      if(by+bh>c.topH+c.gap) return true;
    }
  }
  return false;
}

function checkCoins(){
  for(const coin of coins){
    if(coin.collected) continue;
    const dx=rocket.x+rocket.w/2-coin.x, dy=rocket.y+rocket.h/2-coin.y;
    if(dx*dx+dy*dy<400){
      coin.collected=true; score++;
      if(score>bestScore) bestScore=score;
      sfx.coin();
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2;
        particles.push({x:coin.x,y:coin.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:20,maxLife:20,r:3,col:'#f7931a'});
      }
    }
  }
}

function scoreParticles(){
  for(let i=0;i<14;i++){
    const a=(i/14)*Math.PI*2;
    particles.push({x:W/2,y:80,vx:Math.cos(a)*(Math.random()*4+2),vy:Math.sin(a)*(Math.random()*4+2),life:30,maxLife:30,r:Math.random()*5+3,col:['#f7931a','#ffcc00','#00c853','#fff'][i%4]});
  }
  flashTimer=8;
}

// ── HUD ──────────────────────────────────────────────────
function dollarScore(s){ return '₿'+s.toLocaleString(); }
function drawHUD(){
  // Score as dollar value
  const ds=dollarScore(score);
  ctx.textAlign='center';
  ctx.font='bold 44px Arial'; ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillText(ds,W/2+3,93);
  ctx.strokeStyle='#f7931a'; ctx.lineWidth=4; ctx.strokeText(ds,W/2,90);
  ctx.fillStyle='#fff'; ctx.fillText(ds,W/2,90);
  // Phase badge — only show for bull/bear
  const ph=curPhase(), cfg=curCfg();
  if(ph!=='normal'){
    const bw2=ph==='bull'?100:126;
    ctx.fillStyle=ph==='bull'?'rgba(0,160,60,0.85)':'rgba(180,0,0,0.85)';
    ctx.beginPath(); ctx.roundRect(W/2-bw2/2,100,bw2,22,6); ctx.fill();
    ctx.font='bold 12px Arial'; ctx.fillStyle='#fff';
    ctx.fillText(cfg.label,W/2,115);
    // Phase progress bar
    const total=PHASE_LIMIT[ph], done=candlesInPhase;
    const barW=100, barX=W/2-barW/2;
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.roundRect(barX,125,barW,5,3); ctx.fill();
    ctx.fillStyle=cfg.color; ctx.beginPath(); ctx.roundRect(barX,125,barW*(done/total),5,3); ctx.fill();
  }
}

// ── PHASE ANNOUNCE ───────────────────────────────────────
function drawPhaseAnnounce(){
  if(!phaseAnnounce) return;
  const a=phaseAnnounce, prog=a.life/a.maxLife;
  const sc2=prog<0.2?(1+(1-prog/0.2)*0.6):(prog>0.75?(1-(prog-0.75)/0.25*0.25):1);
  ctx.save();
  ctx.globalAlpha=Math.min(1,prog*5)*Math.min(1,(1-prog)*5);
  ctx.translate(W/2,H/2);
  ctx.scale(sc2,sc2);
  const cfg=PHASE_CFG[a.phase];
  ctx.fillStyle=a.phase==='bull'?'rgba(0,180,60,0.3)':a.phase==='bear'?'rgba(200,0,0,0.3)':'rgba(60,60,200,0.3)';
  ctx.beginPath(); ctx.roundRect(-148,-52,296,104,20); ctx.fill();
  ctx.strokeStyle=cfg.color; ctx.lineWidth=2.5; ctx.stroke();
  ctx.textAlign='center';
  ctx.font='bold 34px Arial'; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=5;
  ctx.strokeText(cfg.label,0,2); ctx.fillStyle=cfg.color; ctx.fillText(cfg.label,0,2);
  ctx.font='bold 15px Arial'; ctx.fillStyle='rgba(255,255,255,0.9)';
  const sub=a.phase==='bull'?'All GREEN candles  •  Gaps are HIGH 📈':
            a.phase==='bear'?'All RED candles  •  Gaps are LOW 📉':
            'Mixed candles  •  Random gaps 📊';
  ctx.fillText(sub,0,30);
  ctx.restore();
}

// ── MILESTONE ────────────────────────────────────────────
function drawMilestone(){
  if(!milestoneAnnounce) return;
  const a=milestoneAnnounce, prog=a.life/a.maxLife;
  const sc2=prog<0.15?(1+(1-prog/0.15)*0.8):(prog>0.75?(1-(prog-0.75)/0.25*0.2):1);
  ctx.save();
  ctx.globalAlpha=Math.min(1,prog*4)*Math.min(1,(1-prog)*5);
  ctx.translate(W/2,H*0.33);
  ctx.scale(sc2,sc2);
  for(let i=0;i<12;i++){
    const ang=(i/12)*Math.PI*2, len=55*(1-prog*0.4);
    ctx.strokeStyle=['#f7931a','#ffcc00','#00c853','#fff','#ff6b6b'][i%5]; ctx.lineWidth=2.5; ctx.globalAlpha*=0.6;
    ctx.beginPath(); ctx.moveTo(Math.cos(ang)*20,Math.sin(ang)*20); ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); ctx.stroke();
    ctx.globalAlpha/=0.6;
  }
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(-118,-36,236,72,16); ctx.fill();
  ctx.strokeStyle='#f7931a'; ctx.lineWidth=2; ctx.stroke();
  ctx.textAlign='center';
  ctx.font='bold 24px Arial'; ctx.strokeStyle='#7a3000'; ctx.lineWidth=4; ctx.strokeText('🎉 TO THE MOON! 🎉',0,-8);
  ctx.fillStyle='#f7931a'; ctx.fillText('🎉 TO THE MOON! 🎉',0,-8);
  ctx.font='bold 14px Arial'; ctx.fillStyle='#fff'; ctx.fillText(`Score ${a.score} reached!`,0,18);
  ctx.restore();
}

// ── IDLE SCREEN ──────────────────────────────────────────
function drawIdle(){
  ctx.fillStyle='rgba(0,0,10,0.62)';
  ctx.beginPath(); ctx.roundRect(W/2-155,H/2-140,310,250,20); ctx.fill();
  ctx.strokeStyle='rgba(247,147,26,0.5)'; ctx.lineWidth=2; ctx.stroke();
  ctx.textAlign='center';
  ctx.font='bold 44px Arial'; ctx.strokeStyle='#7a3000'; ctx.lineWidth=5;
  ctx.strokeText('TO THE MOON!',W/2,H/2-85); ctx.fillStyle='#f7931a'; ctx.fillText('TO THE MOON!',W/2,H/2-85);
  ctx.font='30px Arial'; ctx.fillText('🚀  ₿  🌙',W/2,H/2-38);
  const pulse=0.6+Math.sin(frame*0.08)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font='bold 24px Arial'; ctx.fillStyle='#fff'; ctx.strokeStyle='#333'; ctx.lineWidth=3;
  ctx.strokeText('TAP TO LAUNCH 🚀',W/2,H/2+18); ctx.fillText('TAP TO LAUNCH 🚀',W/2,H/2+18);
  ctx.globalAlpha=1;
  if(bestScore>0){
    ctx.font='bold 20px Arial'; ctx.fillStyle='#f7931a'; ctx.strokeStyle='#7a3000'; ctx.lineWidth=2;
    ctx.strokeText(`Best: ${dollarScore(bestScore)}`,W/2,H/2+68); ctx.fillText(`Best: ${dollarScore(bestScore)}`,W/2,H/2+68);
  }
}

// ── DEAD SCREEN ──────────────────────────────────────────
function drawDead(){
  ctx.fillStyle='rgba(0,0,10,0.78)';
  ctx.beginPath(); ctx.roundRect(W/2-145,H/2-158,290,318,20); ctx.fill();
  ctx.strokeStyle='rgba(213,0,0,0.6)'; ctx.lineWidth=2; ctx.stroke();
  ctx.textAlign='center';
  ctx.font='bold 40px Arial'; ctx.strokeStyle='#7a0000'; ctx.lineWidth=4;
  ctx.strokeText('RUGGED! 💀',W/2,H/2-112); ctx.fillStyle='#ff4444'; ctx.fillText('RUGGED! 💀',W/2,H/2-112);
  ctx.font='bold 22px Arial'; ctx.fillStyle='#fff'; ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.strokeText(`Score: ${dollarScore(score)}`,W/2,H/2-70); ctx.fillText(`Score: ${dollarScore(score)}`,W/2,H/2-70);
  ctx.font='bold 18px Arial'; ctx.fillStyle='#f7931a'; ctx.strokeStyle='#7a3000'; ctx.lineWidth=2;
  ctx.strokeText(`Best: ${dollarScore(bestScore)}`,W/2,H/2-38); ctx.fillText(`Best: ${dollarScore(bestScore)}`,W/2,H/2-38);
  const msgs=['Market crashed 📉','Candle got you 🕯️','HODL next time 💎','Bear market wins 🐻','Paper hands 📄'];
  ctx.font='italic 13px Arial'; ctx.fillStyle='rgba(255,150,100,0.8)'; ctx.fillText(msgs[score%msgs.length],W/2,H/2-12);
  // HOF
  ctx.font='bold 14px Arial'; ctx.fillStyle='rgba(255,200,80,0.95)'; ctx.fillText('🏆 Hall of Fame',W/2,H/2+18);
  if(hof.length===0){
    ctx.font='12px Arial'; ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fillText('No scores yet!',W/2,H/2+42);
  } else {
    hof.slice(0,5).forEach((s,i)=>{
      ctx.font=i===0?'bold 15px Arial':'12px Arial';
      ctx.fillStyle=i===0?'#f7931a':i===1?'#c0c0c0':i===2?'#cd7f32':'rgba(255,255,255,0.55)';
      ctx.fillText(['🥇','🥈','🥉','4️⃣','5️⃣'][i]+' '+s,W/2,H/2+42+i*21);
    });
  }
  const pulse=0.6+Math.sin(frame*0.1)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font='bold 20px Arial'; ctx.fillStyle='#fff'; ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.strokeText('TAP TO RETRY',W/2,H/2+170); ctx.fillText('TAP TO RETRY',W/2,H/2+170);
  ctx.globalAlpha=1;
}

// ── UPDATE ───────────────────────────────────────────────
function update(){
  frame++;
  if(phaseAnnounce){ phaseAnnounce.life--; if(phaseAnnounce.life<=0) phaseAnnounce=null; }
  if(milestoneAnnounce){ milestoneAnnounce.life--; if(milestoneAnnounce.life<=0) milestoneAnnounce=null; }

  if(state==='playing'){
    rocket.vy+=GRAVITY; rocket.y+=rocket.vy;
    rocket.ft++; rocket.rot=Math.max(-30,Math.min(85,rocket.vy*4));

    if(frame%SPAWN_EVERY===0) spawnCandle();

    for(const c of candles){
      c.x-=SPEED;
      if(!c.scored&&c.x+CANDLE_W<rocket.x){
        c.scored=true; score++;
        if(score>bestScore) bestScore=score;
        scoreParticles(); sfx.score();
        if(score%25===0){
          milestoneAnnounce={score,life:150,maxLife:150};
          sfx.milestone();
          for(let i=0;i<30;i++) particles.push({x:Math.random()*W,y:Math.random()*(H/2),vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5+1,life:55,maxLife:55,r:Math.random()*6+3,col:['#f7931a','#ffcc00','#00c853','#fff','#ff6b6b'][i%5]});
        }
      }
    }
    candles=candles.filter(c=>c.x+CANDLE_W+20>0);
    for(const coin of coins){ coin.x-=SPEED; coin.anim+=0.06; }
    coins=coins.filter(c=>c.x>-20);
    checkCoins();

    if(checkHit()){
      state='dead'; rocket.alive=false;
      sfx.death(); stopMusic(); addHof(score);
      // Epic explosion
      for(let i=0;i<45;i++) particles.push({x:rocket.x+rocket.w/2,y:rocket.y+rocket.h/2,vx:(Math.random()-0.5)*15,vy:(Math.random()-0.5)*15-4,life:55+Math.random()*20,maxLife:75,r:Math.random()*9+3,col:['#f7931a','#ff4500','#ffcc00','#fff','#ff0000','#ff6600'][Math.floor(Math.random()*6)]});
      for(let i=0;i<20;i++){const a=(i/20)*Math.PI*2; particles.push({x:rocket.x+rocket.w/2,y:rocket.y+rocket.h/2,vx:Math.cos(a)*9,vy:Math.sin(a)*9,life:20,maxLife:20,r:4,col:'rgba(255,200,100,0.8)'});}
    }
  }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; });
  particles=particles.filter(p=>p.life>0);
  if(flashTimer>0) flashTimer--;
}

// ── DRAW ─────────────────────────────────────────────────
function draw(){
  drawBackground();
  if(flashTimer>0){ ctx.fillStyle=`rgba(255,200,50,${flashTimer/8*0.2})`; ctx.fillRect(0,0,W,H); }
  candles.forEach(drawCandle);
  coins.forEach(drawCoin);
  drawGround();
  particles.forEach(p=>{ ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
  if(state!=='idle') drawRocket();
  if(state==='playing'){ drawHUD(); drawPhaseAnnounce(); drawMilestone(); }
  if(state==='idle') drawIdle();
  if(state==='dead') drawDead();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
initGame(); loop();
</script>
